<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Token</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h2 id="title">Token Service</h2>
    <p id="token">TOKEN_PLACEHOLDER</p>
    <button id="copyBtn">Copy Token</button>
    <p class="note">Token ini akan kadaluarsa dalam 2 menit.</p>
  </div>

  <script>
    // Script copy token
    const tokenElement = document.getElementById('token');
    const copyBtn = document.getElementById('copyBtn');

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(tokenElement.textContent)
        .then(() => alert('Token berhasil dicopy!'))
        .catch(err => alert('Gagal copy token: ' + err));
    });
  </script>
</body>
</html>
